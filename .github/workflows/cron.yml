name: Internship Email Automation

on:
  schedule:
    # Runs every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Automation Script
        env:
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: 587
          INST_EMAIL: ${{ secrets.INST_EMAIL }}
          INST_PASS: ${{ secrets.INST_PASS }}
          PERS_EMAIL: ${{ secrets.PERS_EMAIL }}
          PERS_PASS: ${{ secrets.PERS_PASS }}
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: python email_automation.py

      - name: Commit Updated Database
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add tracking.db
          # Only commit and push if tracking.db has changed
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update tracking.db state"
            git push
          else
            echo "No changes to commit."
          fi